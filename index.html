<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberRPS - 賽博猜拳傳輸系統</title>
    <!-- 外部函式庫 -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
      :root {
        --neon-cyan: #00f3ff;
        --neon-pink: #ff00ff;
        --bg-dark: #0a0a12;
      }
      body {
        margin: 0;
        background-color: #0d0d1a;
        color: white;
        font-family: 'Courier New', Courier, monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
        /* 賽博龐克背景裝飾：重複的猜拳霓虹圖案 */
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150"><text y="50" font-size="30" fill="rgba(0, 243, 255, 0.2)" style="text-shadow: 0 0 5px %2300f3ff;">✊ ✋ ✌️</text><text x="20" y="120" font-size="30" fill="rgba(255, 0, 255, 0.2)" style="text-shadow: 0 0 5px %23ff00ff;">✌️ ✊ ✋</text></svg>');
        background-repeat: repeat;
        background-size: 150px 150px;
      }
      /* 掃描線特效 */
      body::after {
        content: " ";
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
        z-index: 100;
      }
      #main-container {
        position: relative;
        width: 80vw;
        max-width: 380px; /* 更加纖細的直立比例 */
        height: 85vh;
        border: 5px solid var(--neon-cyan);
        box-shadow: 0 0 25px var(--neon-cyan), inset 0 0 15px var(--neon-cyan);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.8);
      }
      #video-wrapper {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
      }
      video {
        max-width: 80%;
        max-height: 80%;
        border: 2px solid var(--neon-pink);
        object-fit: contain;
        transform: scaleX(-1); /* 修正攝影機左右相反問題 */
      }
      #ui-overlay {
        position: absolute;
        bottom: 20px;
        text-align: center;
        width: 100%;
        z-index: 10;
      }
      #status-msg {
        font-size: 24px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--neon-cyan);
        text-shadow: 0 0 10px var(--neon-cyan);
      }
      #ai-hand {
        position: absolute;
        top: 20px;
        width: 100%;
        font-size: 100px;
        text-align: center;
        text-shadow: 0 0 20px var(--neon-cyan);
        z-index: 5;
      }
      #qrcode-container {
        background: white;
        padding: 10px;
        display: inline-block; /* 消除右側留白 */
        border-radius: 5px;
        box-shadow: 0 0 15px white;
      }
      .setup-screen {
        text-align: center;
      }
      #game-over-screen {
        display: none; /* 初始隱藏 */
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        text-shadow: 0 0 15px var(--neon-pink);
      }
      /* 畫面震動特效 */
      @keyframes shake {
        0% { transform: translate(1px, 1px) rotate(0deg); }
        10% { transform: translate(-1px, -2px) rotate(-1deg); }
        20% { transform: translate(-3px, 0px) rotate(1deg); }
        30% { transform: translate(3px, 2px) rotate(0deg); }
        40% { transform: translate(1px, -1px) rotate(1deg); }
        50% { transform: translate(-1px, 2px) rotate(-1deg); }
        60% { transform: translate(-3px, 1px) rotate(0deg); }
        70% { transform: translate(3px, 1px) rotate(-1deg); }
        80% { transform: translate(-1px, -1px) rotate(1deg); }
        90% { transform: translate(1px, 2px) rotate(0deg); }
        100% { transform: translate(1px, -2px) rotate(-1deg); }
      }
      .shake-effect {
        animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
      }
    </style>
  </head>
  <body>
    <div id="main-container">
      <!-- 初始連接畫面 -->
      <div id="setup-screen" class="setup-screen">
        <h2 style="color: var(--neon-cyan)">SYSTEM INITIALIZING...</h2>
        <div id="qrcode-container"></div>
        <p style="margin-top: 15px; color: var(--neon-pink); font-size: 14px;">掃描 QR CODE 以啟動同步</p>
      </div>
      <!-- 遊戲畫面 -->
      <div id="game-screen" style="display:none; width:100%; height:100%;">
        <div id="countdown"></div>
        <div id="ai-hand">🤖</div>
        <div id="video-wrapper">
          <video id="remote-video" autoplay playsinline muted></video>
        </div>
        <div id="ui-overlay">
          <div id="status-msg">等待手勢辨識中...</div>
        </div>
      </div>
      <!-- 遊戲結束畫面 -->
      <div id="game-over-screen">
        <p style="color: var(--neon-pink);">遊戲結束</p>
        <p style="font-size: 20px; color: var(--neon-cyan);">比出 👍 手勢以重新開始</p>
      </div>
    </div>
    <script src="sketch.js"></script>
  </body>
</html>
